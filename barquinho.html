<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade 10 - Barquinho</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ddd;
        }

        .cena {
            width: 700px;
            height: 400px;
            margin: 40px auto;
            position: relative;
            overflow: hidden;
            background: linear-gradient(#bfefff, #e8fbff);
            border: 2px solid #ccc;
        }

        .nuvem {
            width: 90px;
            height: 35px;
            background: white;
            border-radius: 30px;
            position: absolute;
            top: 70px;
            left: -120px;
            box-shadow: 25px -18px 0 8px white, 55px -5px 0 5px white;
            animation: nuvem-passando 18s linear infinite;
        }

        .barco {
            width: 90px;
            height: 55px;
            position: absolute;
            bottom: 105px;
            left: -100px;
            z-index: 3;
            animation: navegar 9s linear infinite, balancar 1.5s ease-in-out infinite alternate;
        }

        .casco {
            width: 80px;
            height: 25px;
            background: white;
            border: 4px solid #222;
            border-top: none;
            border-radius: 0 0 45px 45px;
            position: absolute;
            bottom: 0;
        }

        .vela {
            width: 0;
            height: 0;
            border-left: 35px solid transparent;
            border-bottom: 55px solid #77d9ff;
            position: absolute;
            left: 28px;
            bottom: 22px;
        }

        .mastro {
            width: 4px;
            height: 70px;
            background: #222;
            position: absolute;
            left: 45px;
            bottom: 20px;
        }

        .mar {
            width: 100%;
            height: 120px;
            background: #355cff;
            position: absolute;
            bottom: 0;
            z-index: 2;
        }

        .mar::before,
        .mar::after {
            content: "";
            width: 140%;
            height: 45px;
            position: absolute;
            top: -22px;
            left: -20%;
            background: radial-gradient(circle, #6f8cff 25%, transparent 27%);
            background-size: 70px 45px;
            animation: ondas 4s linear infinite;
        }

        .mar::after {
            opacity: .7;
            top: -12px;
            animation-duration: 6s;
        }

        @keyframes navegar {
            from { left: -110px; }
            to { left: 720px; }
        }

        @keyframes balancar {
            from { transform: rotate(-4deg); }
            to { transform: rotate(4deg); }
        }

        @keyframes ondas {
            from { transform: translateX(0); }
            to { transform: translateX(70px); }
        }

        @keyframes nuvem-passando {
            from { left: -140px; }
            to { left: 760px; }
        }
    </style>
</head>
<body>
    <div class="cena">
        <div class="nuvem"></div>

        <div class="barco">
            <div class="mastro"></div>
            <div class="vela"></div>
            <div class="casco"></div>
        </div>

        <div class="mar"></div>
    </div>
</body>
</html>
