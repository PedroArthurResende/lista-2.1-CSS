<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade 6B - Display inline-block</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        .caixa {
            display: inline-block;
            width: 25%;
            height: 90px;
            line-height: 90px;
            text-align: center;
        }
        .roxa { background: purple; }
        .verde { background: green; }
        .vermelha { background: red; }
        .amarela { background: yellow; }
    </style>
</head>
<body>
    <div class="caixa roxa">1</div><div class="caixa verde">2</div><div class="caixa vermelha">3</div><div class="caixa amarela">4</div>

    <p>Agora as divs ficam lado a lado porque foi usado display inline-block.</p>
</body>
</html>
