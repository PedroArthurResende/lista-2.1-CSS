<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade 1 - Regra CSS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            line-height: 1.5;
        }

        h1 {
            color: darkgreen;
        }

        .exemplo {
            color: darkblue;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>O que é uma regra CSS?</h1>

    <p>
        Uma regra CSS é uma instrução usada para mudar a aparência de um elemento HTML.
        Ela normalmente possui um seletor, uma propriedade e um valor.
    </p>

    <p>
        No exemplo <span class="exemplo">h1 { color: darkgreen; }</span>, o seletor é o
        <strong>h1</strong>, a propriedade é <strong>color</strong> e o valor é
        <strong>darkgreen</strong>.
    </p>
</body>
</html>
