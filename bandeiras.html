<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade 8 - Bandeiras</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        nav a { margin-right: 12px; }

        .bandeira {
            width: 300px;
            height: 190px;
            border: 1px solid #999;
            margin: 25px 0;
            position: relative;
            overflow: hidden;
        }

        #japao.bandeira > div.circulo {
            width: 90px;
            height: 90px;
            background: crimson;
            border-radius: 50%;
            position: absolute;
            top: 50px;
            left: 105px;
        }

        #alemanha.bandeira > div { height: 33.33%; }
        #alemanha .preto { background: black; }
        #alemanha .vermelho { background: red; }
        #alemanha .amarelo { background: gold; }

        #holanda.bandeira > div { height: 33.33%; }
        #holanda .vermelho { background: #ae1c28; }
        #holanda .branco { background: white; }
        #holanda .azul { background: #21468b; }

        #italia.bandeira > div {
            width: 33.33%;
            height: 100%;
            float: left;
        }
        #italia .verde { background: #009246; }
        #italia .branco { background: white; }
        #italia .vermelho { background: #ce2b37; }

        #brasil.bandeira { background: #009c3b; }
        #brasil.bandeira > div.losango {
            width: 190px;
            height: 190px;
            background: #ffdf00;
            position: absolute;
            top: 0;
            left: 55px;
            transform: rotate(45deg) scale(.72);
        }
        #brasil.bandeira > div.circulo {
            width: 85px;
            height: 85px;
            background: #002776;
            border-radius: 50%;
            position: absolute;
            top: 52px;
            left: 107px;
        }
    </style>
</head>
<body>
    <h1>Bandeiras feitas com HTML e CSS</h1>

    <nav>
        <a href="#japao">Japão</a>
        <a href="#alemanha">Alemanha</a>
        <a href="#holanda">Holanda</a>
        <a href="#italia">Itália</a>
        <a href="#brasil">Brasil</a>
    </nav>

    <h2>Japão</h2>
    <div class="bandeira" id="japao"><div class="circulo"></div></div>

    <h2>Alemanha</h2>
    <div class="bandeira" id="alemanha">
        <div class="preto"></div><div class="vermelho"></div><div class="amarelo"></div>
    </div>

    <h2>Holanda</h2>
    <div class="bandeira" id="holanda">
        <div class="vermelho"></div><div class="branco"></div><div class="azul"></div>
    </div>

    <h2>Itália</h2>
    <div class="bandeira" id="italia">
        <div class="verde"></div><div class="branco"></div><div class="vermelho"></div>
    </div>

    <h2>Brasil</h2>
    <div class="bandeira" id="brasil"><div class="losango"></div><div class="circulo"></div></div>
</body>
</html>
