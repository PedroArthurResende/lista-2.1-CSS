<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atividade 6A - Display block</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; }
        .caixa {
            height: 80px;
            text-align: center;
            line-height: 80px;
        }
        .roxa { background: purple; }
        .verde { background: green; }
        .vermelha { background: red; }
        .amarela { background: yellow; }
    </style>
</head>
<body>
    <div class="caixa roxa">1</div>
    <div class="caixa verde">2</div>
    <div class="caixa vermelha">3</div>
    <div class="caixa amarela">4</div>

    <p>As divs aparecem uma embaixo da outra porque div é um elemento block por padrão.</p>
</body>
</html>
